name: Live Site Audit

# Renders + feature-tests the LIVE site with real Google Chrome, detects raw
# source-code leaking into the page, runs Lighthouse, and (if a key is set)
# Firecrawl. Results are committed back to the branch so they're readable via API.

on:
  push:
    branches: ["claude/pt-website-audit-playwright-iAQxp", "main"]
    paths: ["index.html", "404.html", "functions/**", "_headers", "_redirects", "audit/**", ".github/workflows/site-audit.yml"]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to audit"
        default: "https://aiphantomtraders.com"
        required: false
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC — weekly freshness + leak canary

permissions:
  contents: write

jobs:
  render-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps + Google Chrome
        working-directory: audit
        run: |
          npm install
          npx playwright install --with-deps chrome || npx playwright install --with-deps chromium

      # Serve THIS branch's static site so the audit verifies our changes
      # (production at aiphantomtraders.com only reflects main once merged).
      # On main, audit the live deployed site; on the feature branch, serve+audit the build.
      - name: Serve branch build
        if: ${{ github.ref_name != 'main' && github.event.inputs.base_url == '' }}
        run: |
          python3 -m http.server 8080 --directory "$GITHUB_WORKSPACE" &
          for i in $(seq 1 20); do curl -sf http://localhost:8080/ >/dev/null && break; sleep 0.5; done

      - name: Run render + feature audit
        working-directory: audit
        env:
          AUDIT_BASE_URL: ${{ github.event.inputs.base_url || (github.ref_name == 'main' && 'https://aiphantomtraders.com' || 'http://localhost:8080') }}
        run: npm run audit

      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-audit
          path: audit/out/

      - name: Commit results back to branch
        if: always()
        run: |
          git config user.name "phantom-audit-bot"
          git config user.email "actions@github.com"
          git add audit-results/report.md audit-results/report.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No result changes to commit."
          else
            git commit -m "audit: live render + feature-test results [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi

      - name: Job summary
        if: always()
        run: cat audit-results/report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "no report" >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.inputs.base_url || 'https://aiphantomtraders.com' }}
          configPath: ./audit/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

  firecrawl:
    runs-on: ubuntu-latest
    steps:
      - name: Firecrawl scrape (if FIRECRAWL_API_KEY set)
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          AUDIT_BASE_URL: ${{ github.event.inputs.base_url || 'https://aiphantomtraders.com' }}
        run: |
          if [ -z "$FIRECRAWL_API_KEY" ]; then
            echo "No FIRECRAWL_API_KEY secret set — skipping Firecrawl. Add it in repo Settings → Secrets to enable."
            exit 0
          fi
          curl -sS -X POST https://api.firecrawl.dev/v1/scrape \
            -H "Authorization: Bearer $FIRECRAWL_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"url\":\"$AUDIT_BASE_URL\",\"formats\":[\"markdown\",\"rawHtml\"]}" \
            -o firecrawl.json
          echo "Firecrawl scrape saved ($(wc -c < firecrawl.json) bytes)."
      - name: Upload Firecrawl output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firecrawl
          path: firecrawl.json
          if-no-files-found: ignore
