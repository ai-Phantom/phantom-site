name: Live Site Audit

# Runs the Playwright render audit + Lighthouse against the LIVE site.
# GitHub runners have open egress and a real Chromium, so this completes the
# visual/perf half that the sandboxed Claude session cannot reach.

on:
  # Push trigger lets the audit run from this branch before it lands on main
  # (workflow_dispatch + schedule only arm once the file is on the default branch).
  push:
    branches: ["claude/pt-website-audit-playwright-iAQxp"]
    paths: ["audit/**", ".github/workflows/site-audit.yml"]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to audit"
        default: "https://aiphantomtraders.com"
        required: false
  schedule:
    - cron: "0 14 * * 1" # Mondays 14:00 UTC — weekly freshness check

jobs:
  render-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps + Google Chrome
        working-directory: audit
        run: |
          npm install
          # Install real Google Chrome stable (plus deps) for render fidelity.
          npx playwright install --with-deps chrome || npx playwright install --with-deps chromium

      - name: Run render audit
        working-directory: audit
        env:
          AUDIT_BASE_URL: ${{ github.event.inputs.base_url || 'https://aiphantomtraders.com' }}
        run: npm run audit

      - name: Upload screenshots + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-audit
          path: audit/out/

      - name: Job summary
        if: always()
        run: cat audit/out/report.md >> "$GITHUB_STEP_SUMMARY" || echo "no report" >> "$GITHUB_STEP_SUMMARY"

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse (desktop)
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.inputs.base_url || 'https://aiphantomtraders.com' }}
          configPath: ./audit/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
